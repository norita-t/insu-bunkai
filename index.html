<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>因数分解トレーニング</title>

  <!-- MathJax -->
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #f8fafc);
      color: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 28px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      width: 400px;
      position: relative;
    }

    h1, h2 { text-align: center; margin-bottom: 16px; }

    .question {
      background: #f1f5f9;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      margin: 14px 0;
      font-size: 22px;
    }

    input {
      width: 36px;
      padding: 4px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      margin: 3px;
      text-align: center;
      font-size: 14px;
    }

    .result {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }

    .mark-item {
      font-size: 13px;
      padding: 6px;
      border-bottom: 1px solid #e5e7eb;
    }

    /* === ボタンデザイン === */
    a.btn_23 {
      display: block;
      text-align: center;
      text-decoration: none;
      width: 250px;
      margin: 10px auto;
      padding: 0.6rem 0;
      font-weight: bold;
      border: 2px solid #27acd9;
      color: #27acd9;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      z-index: 1;
      border-radius: 8px;
      background: #fff;
    }

    /* サブボタン（次・ホーム） */
    a.btn_sub {
      border-color: #94a3b8;
      color: #64748b;
    }
    a.btn_sub::before {
      background-color: #94a3b8;
    }

    /* 小さいマークボタン */
    .mark-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      margin: 0;
      width: auto;
      display: inline-block;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 6px;
    }
    a.btn_23::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgb(39, 172, 217);
      transform: translateX(-100%);
      transition: all .3s;
      z-index: -1;
    }
    a.btn_23:hover::before {
      transform: translateX(0);
    }
    a.btn_23:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card" id="app"></div>

  <script>
    let state = { page: 'home', question: null, level: 1, marks: [] };

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function formatPoly(a2, a1, a0) {
      let parts = [];

      if (a2 !== 0) {
        if (a2 === 1) parts.push("x^2");
        else if (a2 === -1) parts.push("-x^2");
        else parts.push(`${a2}x^2`);
      }

      if (a1 !== 0) {
        const sign = a1 > 0 && parts.length > 0 ? "+" : "";
        let coef = Math.abs(a1) === 1 ? "x" : `${Math.abs(a1)}x`;
        parts.push(`${sign}${a1 < 0 ? "-" : ""}${coef}`);
      }

      if (a0 !== 0) {
        const sign = a0 > 0 && parts.length > 0 ? "+" : "";
        parts.push(`${sign}${a0}`);
      }

      return parts.join(" ") || "0";
    }

    function toLatex(expr) {
      return expr.replace(/x\^2/g, "x^{2}");
    }

    function generateQ1() {
      const a = rand(-5,5);
      const b = rand(-5,5);
      const text = formatPoly(1, a+b, a*b);
      state.question = { a, b, text: `\\(${toLatex(text)}\\)`, raw: text, level:1 };
    }

    function generateQ2() {
      const a = rand(-5,5);
      const b = rand(-5,5);
      const c = rand(-5,5);
      const d = rand(-5,5);
      const text = formatPoly(a*c, a*d + b*c, b*d);
      state.question = { a, b, c, d, text: `\\(${toLatex(text)}\\)`, raw: text, level:2 };
    }

    function render() {
      const app = document.getElementById("app");

      if (state.page === 'home') {
        app.innerHTML = `
          <h1>因数分解トレーニング</h1>
          <a class="btn_23" href="javascript:start(1)">難易度1</a>
          <a class="btn_23" href="javascript:start(2)">難易度2</a>
          <a class="btn_23" href="javascript:openMarks()">マーク一覧</a>
        `;
      } 
      else if (state.page === 'marks') {
        app.innerHTML = `
          <h2>マークした問題</h2>
          <div id="markList"></div>
          <a class="btn_23 btn_sub" href="javascript:home()">ホームへ</a>
        `;

        const list = document.getElementById("markList");
        list.innerHTML = state.marks.length === 0
          ? "なし"
          : state.marks.map(m => `<div class='mark-item'>${m}</div>`).join("");
      }
      else {
        if (state.level === 1) {
          app.innerHTML = `
            <h2>問題</h2>
            <div class="question">${state.question.text}</div>
            <div style="text-align:center">
              (x + <input id="a">)(x + <input id="b">)
            </div>
            <a class="btn_23" href="javascript:check()">回答</a>
            <a class="btn_23" href="javascript:mark()">マーク</a>
            
            <div id="result" class="result"></div>
            <a class="btn_23 btn_sub" href="javascript:next()">次の問題</a>
            <a class="btn_23 btn_sub" href="javascript:home()">ホームへ</a>
          `;
        } else {
          app.innerHTML = `
            <h2>問題</h2>
            <div class="question">${state.question.text}</div>
            <div style="text-align:center">
              (<input id="a">x + <input id="b">)(<input id="c">x + <input id="d">)
            </div>
            <a class="btn_23" href="javascript:check()">回答</a>
            <a class="btn_23" href="javascript:mark()">マーク</a>
            
            <div id="result" class="result"></div>
            <a class="btn_23 btn_sub" href="javascript:next()">次の問題</a>
            <a class="btn_23 btn_sub" href="javascript:home()">ホームへ</a>
          `;
        }
      }

      if (window.MathJax) MathJax.typesetPromise();
    }

    function start(level) {
      state.page = 'q';
      state.level = level;
      level === 1 ? generateQ1() : generateQ2();
      render();
    }

    function next() {
      state.level === 1 ? generateQ1() : generateQ2();
      render();
    }

    function home() {
      state.page = 'home';
      render();
    }

    function openMarks() {
      state.page = 'marks';
      render();
    }

    function mark() {
      state.marks.push(state.question.raw);
      alert("マークしました");
    }

    function check() {
      const resultEl = document.getElementById("result");

      if (state.level === 1) {
        const a = Number(document.getElementById("a").value);
        const b = Number(document.getElementById("b").value);
        if ((a === state.question.a && b === state.question.b) || (a === state.question.b && b === state.question.a)) {
          resultEl.textContent = "正解";
          resultEl.style.color = "green";
        } else {
          resultEl.textContent = "不正解";
          resultEl.style.color = "red";
        }
      } else {
        const a = Number(document.getElementById("a").value);
        const b = Number(document.getElementById("b").value);
        const c = Number(document.getElementById("c").value);
        const d = Number(document.getElementById("d").value);

        const ok1 = (a === state.question.a && b === state.question.b && c === state.question.c && d === state.question.d);
        const ok2 = (a === state.question.c && b === state.question.d && c === state.question.a && d === state.question.b);

        if (ok1 || ok2) {
          resultEl.textContent = "正解";
          resultEl.style.color = "green";
        } else {
          resultEl.textContent = "不正解";
          resultEl.style.color = "red";
        }
      }
    }

    render();
  </script>
</body>
</html>
